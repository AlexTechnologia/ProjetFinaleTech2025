<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- CRITICAL FOR MOBILE: Locks viewport, prevents pinch-zoom and pull-to-refresh -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CHRONO-CORE | Mobile Arena</title>
    
    <!-- Load Nipple.js for Virtual Joysticks -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.2/nipplejs.min.js"></script>

    <style>
        /* =====================================================================
           UI & STYLES (MOBILE RESPONSIVE)
           ===================================================================== */
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: #050508; 
            color: #fff; 
            font-family: 'Orbitron', sans-serif; 
            overflow: hidden; 
            /* Prevents mobile swipe-navigation and highlighting */
            touch-action: none; 
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            overscroll-behavior: none;
        }
        
        #gameCanvas {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; cursor: crosshair;
        }

        /* CRT Overlay */
        .crt::before {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2; background-size: 100% 2px, 3px 100%; pointer-events: none;
        }

        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
        .interactive { pointer-events: auto; }
        .hidden { display: none !important; }

        /* Menus */
        .menu { background: rgba(10, 10, 15, 0.85); backdrop-filter: blur(10px); padding: 40px; border: 2px solid #0ff; border-radius: 15px; text-align: center; box-shadow: 0 0 30px rgba(0, 255, 255, 0.2); max-width: 90vw; }
        h1 { font-size: clamp(2rem, 5vw, 3.5rem); color: #0ff; text-shadow: 0 0 20px #0ff; margin-bottom: 10px; font-weight: 900; letter-spacing: 2px; }
        p.subtitle { color: #aaa; margin-bottom: 30px; font-size: 1.1rem; line-height: 1.6; }
        
        button { background: transparent; color: #0ff; font-family: 'Orbitron', sans-serif; font-size: 1.2rem; border: 2px solid #0ff; padding: 15px 30px; cursor: pointer; transition: all 0.2s ease; text-transform: uppercase; letter-spacing: 2px; border-radius: 5px; font-weight: bold; touch-action: manipulation; }
        button:hover { background: #0ff; color: #000; box-shadow: 0 0 20px #0ff; transform: scale(1.05); }

        /* HUD */
        #hud { position: absolute; top: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between; z-index: 5; pointer-events: none; }
        .bar-container { width: 300px; max-width: 35vw; height: 18px; background: rgba(255,255,255,0.1); border: 2px solid #444; border-radius: 10px; overflow: hidden; margin-bottom: 8px; }
        #hpBar { width: 100%; height: 100%; background: #f05; box-shadow: 0 0 10px #f05; transition: width 0.2s; }
        #xpBar { width: 0%; height: 100%; background: #0ff; box-shadow: 0 0 10px #0ff; transition: width 0.2s; }
        .hud-text { font-size: 1.2rem; text-shadow: 0 0 5px #000; margin-bottom: 5px; font-weight: bold; }
        #stats { text-align: right; }

        /* Icon Buttons (Top Right) */
        #controls-bar { position: absolute; top: 20px; right: 20px; display: flex; gap: 10px; z-index: 100; pointer-events: auto; }
        .icon-btn { background: rgba(10,10,15,0.8); border: 2px solid #0ff; border-radius: 8px; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; box-shadow: 0 0 10px rgba(0,255,255,0.2); touch-action: manipulation; }
        .icon-btn:hover { background: #0ff; transform: scale(1.1); }
        .icon-btn:hover svg { stroke: #000; }

        /* Upgrades Menu */
        #upgradeScreen { background: rgba(0,0,0,0.85); overflow-y: auto; justify-content: flex-start; padding: 50px 20px; }
        .cards { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 30px; width: 100%; max-width: 900px; }
        .card { width: 220px; flex: 1 1 200px; background: rgba(20,20,30,0.9); border: 2px solid #ff0055; padding: 25px 20px; border-radius: 10px; cursor: pointer; transition: all 0.2s; display: flex; flex-direction: column; align-items: center; box-shadow: 0 0 15px rgba(255,0,85,0.2); touch-action: manipulation; }
        .card:hover { transform: translateY(-5px); background: rgba(40,20,40,0.9); box-shadow: 0 0 25px #ff0055; }
        .card h3 { color: #ff0055; margin-bottom: 10px; font-size: 1.2rem; text-align: center; }
        .card p { font-size: 0.9rem; color: #ccc; text-align: center; line-height: 1.4; }

        /* Virtual Joystick Zones */
        .joystick-zone { position: absolute; top: 0; width: 50vw; height: 100vh; z-index: 4; pointer-events: none; }
        #leftZone { left: 0; } #rightZone { right: 0; }
        body.touch-device.playing .joystick-zone { pointer-events: auto; }

        @media (max-width: 768px) {
            #hud { top: 10px; left: 10px; right: 10px; }
            #controls-bar { top: 10px; right: 10px; }
            #stats { margin-right: 110px; } /* clear space for buttons */
            .hud-text { font-size: 1rem; }
        }
    </style>
</head>
<body class="crt">

    <canvas id="gameCanvas"></canvas>

    <!-- Invisible Zones for Dynamic Dual Joysticks -->
    <div id="leftZone" class="joystick-zone"></div>
    <div id="rightZone" class="joystick-zone"></div>

    <div id="controls-bar" class="hidden">
        <div id="pauseBtn" class="icon-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#0ff" stroke-width="2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
        </div>
        <div id="fullscreenToggle" class="icon-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#0ff" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
        </div>
    </div>

    <!-- Main Menu -->
    <div id="startScreen" class="ui-layer interactive">
        <div class="menu">
            <h1>CHRONO-CORE</h1>
            <p class="subtitle"><strong>Desktop:</strong> WASD to move, Mouse to aim/shoot.<br><strong>Mobile:</strong> Touch left to move, touch right to aim/shoot.</p>
            <button id="startBtn">Initialize System</button>
        </div>
    </div>

    <!-- Gameplay HUD -->
    <div id="hud" class="hidden">
        <div>
            <div class="hud-text" id="levelText">LEVEL 1</div>
            <div class="bar-container"><div id="hpBar"></div></div>
            <div class="bar-container"><div id="xpBar"></div></div>
        </div>
        <div id="stats">
            <div class="hud-text" id="scoreText">SCORE: 0</div>
            <div class="hud-text" id="timeText">00:00</div>
        </div>
    </div>

    <!-- Pause Screen -->
    <div id="pauseScreen" class="ui-layer interactive hidden">
        <div class="menu">
            <h1 style="color: #0ff;">SYSTEM PAUSED</h1>
            <button onclick="resumeFromPause()">Resume Process</button>
        </div>
    </div>

    <!-- Upgrade Screen -->
    <div id="upgradeScreen" class="ui-layer interactive hidden">
        <h1 style="color: #0ff; text-shadow: 0 0 20px #0ff; text-align: center;">SYSTEM UPGRADE</h1>
        <p style="font-size: 1.2rem; text-align: center;">Select enhancement protocol:</p>
        <div class="cards" id="upgradeCards"></div>
    </div>

    <!-- Game Over Screen -->
    <div id="gameOverScreen" class="ui-layer interactive hidden">
        <div class="menu">
            <h1 style="color: #f05; text-shadow: 0 0 20px #f05;">CRITICAL FAILURE</h1>
            <p class="subtitle" id="finalStats"></p>
            <button id="restartBtn">Reboot Core</button>
        </div>
    </div>

    <script>
        /* =====================================================================
           ENGINE & AUDIO SYNTHESIS
           ===================================================================== */
        const WebAudioSynth = {
            ctx: null,
            init() { if(!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
            playTone(freq, type, duration, vol) {
                if(!this.ctx || this.ctx.state === 'suspended') return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = type; osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                osc.connect(gain); gain.connect(this.ctx.destination);
                gain.gain.setValueAtTime(vol, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
                osc.start(); osc.stop(this.ctx.currentTime + duration);
            },
            playShoot() { this.playTone(800, 'square', 0.1, 0.05); this.playTone(400, 'sawtooth', 0.15, 0.05); },
            playHit() { this.playTone(150, 'sawtooth', 0.1, 0.1); },
            playExp() { this.playTone(100, 'square', 0.3, 0.2); this.playTone(50, 'sawtooth', 0.4, 0.2); },
            playXP() { this.playTone(1200, 'sine', 0.1, 0.05); },
            playLevelUp() {[400, 500, 600, 800].forEach((f,i) => setTimeout(() => this.playTone(f, 'square', 0.2, 0.1), i*100)); }
        };

        // Unlock audio on first interaction (Required for iOS)
        function unlockAudio() {
            WebAudioSynth.init();
            if (WebAudioSynth.ctx && WebAudioSynth.ctx.state === 'suspended') WebAudioSynth.ctx.resume();
        }
        window.addEventListener('touchstart', unlockAudio, { once: true });
        window.addEventListener('click', unlockAudio, { once: true });

        const MathUtils = {
            dist: (x1, y1, x2, y2) => Math.sqrt((x2-x1)**2 + (y2-y1)**2),
            angle: (x1, y1, x2, y2) => Math.atan2(y2-y1, x2-x1),
            clamp: (val, min, max) => Math.max(min, Math.min(max, val)),
            rand: (min, max) => Math.random() * (max - min) + min
        };

        /* =====================================================================
           GAME STATE & GLOBALS
           ===================================================================== */
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let cw, ch;

        const STATE = { MENU: 0, PLAYING: 1, UPGRADE: 2, GAMEOVER: 3, PAUSED: 4 };
        let currentState = STATE.MENU;
        
        const keys = { w:false, a:false, s:false, d:false };
        const mouse = { x: 0, y: 0, down: false };
        let camera = { x: 0, y: 0 };
        let screenShake = 0;
        
        let lastTime = 0, dt = 0, gameTime = 0, score = 0;
        let difficultyMultiplier = 1;

        let player, entities = { enemies: [], bullets:[], particles: [], gems: [], texts:[] };

        /* =====================================================================
           MOBILE TOUCH CONTROLS (NIPPLE.JS)
           ===================================================================== */
        let touchMode = false;
        const touchInput = {
            move: { active: false, angle: 0, distance: 0 },
            aim: { active: false, angle: 0 }
        };

        // Detect touch capability dynamically
        window.addEventListener('touchstart', function enableTouch() {
            touchMode = true;
            document.body.classList.add('touch-device');
            if (currentState === STATE.PLAYING) initTouchControls();
        }, { once: true });

        function initTouchControls() {
            if (window.joysticksInited || typeof nipplejs === 'undefined') return;
            window.joysticksInited = true;

            const moveStick = nipplejs.create({ zone: document.getElementById('leftZone'), mode: 'dynamic', color: '#0ff' });
            const aimStick = nipplejs.create({ zone: document.getElementById('rightZone'), mode: 'dynamic', color: '#f05' });

            // Movement Events
            moveStick.on('start', () => touchInput.move.active = true);
            moveStick.on('end', () => touchInput.move.active = false);
            moveStick.on('move', (evt, data) => { 
                if(data.angle) { touchInput.move.angle = data.angle.radian; touchInput.move.distance = data.distance; }
            });

            // Aiming Events
            aimStick.on('start', () => touchInput.aim.active = true);
            aimStick.on('end', () => touchInput.aim.active = false);
            aimStick.on('move', (evt, data) => { 
                if(data.angle) touchInput.aim.angle = data.angle.radian;
            });
        }

        /* =====================================================================
           CLASSES
           ===================================================================== */
        class GameObject {
            constructor(x, y, r, color) {
                this.x = x; this.y = y; this.r = r; this.color = color;
                this.vx = 0; this.vy = 0; this.markedForDeletion = false;
            }
            update(dt) { this.x += this.vx * dt; this.y += this.vy * dt; }
            draw(ctx) {
                ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
                ctx.fillStyle = this.color; ctx.shadowBlur = 15; ctx.shadowColor = this.color;
                ctx.fill(); ctx.shadowBlur = 0;
            }
        }

        class Player extends GameObject {
            constructor(x, y) {
                super(x, y, 12, '#fff');
                this.speed = 250; this.maxHp = 100; this.hp = 100;
                this.xp = 0; this.level = 1; this.xpToNext = 100;
                this.visualAngle = 0;
                
                // Weapon Stats
                this.shootTimer = 0; this.fireRate = 0.2; 
                this.damage = 10; this.pierce = 1; this.multiShot = 1; this.bulletSpeed = 600;
                this.magnetRadius = 100;
            }
            update(dt) {
                let dx = 0, dy = 0;

                // 1. Resolve Movement
                if (touchInput.move.active) {
                    // Analog Stick input
                    let intensity = Math.min(1, touchInput.move.distance / 50);
                    dx = Math.cos(touchInput.move.angle) * intensity;
                    dy = -Math.sin(touchInput.move.angle) * intensity;
                } else {
                    // Digital Keyboard input
                    if(keys.w) dy -= 1; if(keys.s) dy += 1;
                    if(keys.a) dx -= 1; if(keys.d) dx += 1;
                    if(dx !== 0 || dy !== 0) {
                        let mag = Math.sqrt(dx*dx + dy*dy);
                        dx /= mag; dy /= mag; // Normalize diagonal speed
                    }
                }
                this.vx = dx !== 0 ? dx * this.speed : this.vx * 0.8;
                this.vy = dy !== 0 ? dy * this.speed : this.vy * 0.8;

                super.update(dt);

                // 2. Resolve Aim & Shooting
                let aimAngle = this.visualAngle;
                let isShooting = false;

                if (touchInput.aim.active) {
                    isShooting = true; aimAngle = -touchInput.aim.angle;
                } else if (mouse.down) {
                    isShooting = true; aimAngle = MathUtils.angle(this.x, this.y, mouse.x + camera.x, mouse.y + camera.y);
                }

                if (isShooting) {
                    this.visualAngle = aimAngle;
                } else if (dx !== 0 || dy !== 0) {
                    this.visualAngle = Math.atan2(dy, dx);
                }

                this.shootTimer -= dt;
                if(isShooting && this.shootTimer <= 0) this.shoot(aimAngle);
                
                // 3. Keep in bounds
                this.x = MathUtils.clamp(this.x, -2500, 2500);
                this.y = MathUtils.clamp(this.y, -2500, 2500);
            }
            shoot(angle) {
                this.shootTimer = this.fireRate;
                WebAudioSynth.playShoot();
                
                let spread = 0.15; // Radians
                let startAngle = angle - (spread * (this.multiShot-1)) / 2;

                for(let i=0; i<this.multiShot; i++) {
                    let a = startAngle + (i * spread);
                    let b = new Bullet(this.x, this.y, a, this.bulletSpeed, this.damage, this.pierce);
                    entities.bullets.push(b);
                }
                spawnParticles(this.x, this.y, 3, '#fff', 50, angle + Math.PI, 0.5);
            }
            draw(ctx) {
                ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.visualAngle);
                ctx.beginPath();
                ctx.moveTo(15, 0); ctx.lineTo(-10, 10); ctx.lineTo(-10, -10); ctx.closePath();
                ctx.fillStyle = this.color; ctx.shadowBlur = 20; ctx.shadowColor = '#0ff';
                ctx.fill(); ctx.restore();

                // Magnet radius visualization
                ctx.beginPath(); ctx.arc(this.x, this.y, this.magnetRadius, 0, Math.PI*2);
                ctx.strokeStyle = 'rgba(0, 255, 255, 0.05)'; ctx.stroke();
            }
            takeDamage(amt) {
                this.hp -= amt;
                WebAudioSynth.playHit();
                screenShake = 15; // Trigger render shake
                updateHUD();
                if(this.hp <= 0) gameOver();
            }
            addXP(amt) {
                this.xp += amt; WebAudioSynth.playXP();
                if(this.xp >= this.xpToNext) {
                    this.xp -= this.xpToNext; this.level++; 
                    this.xpToNext = Math.floor(this.xpToNext * 1.5);
                    triggerLevelUp();
                }
                updateHUD();
            }
        }

        class Enemy extends GameObject {
            constructor(x, y, type) {
                super(x, y, 10, type === 1 ? '#f05' : '#f0f');
                this.type = type;
                this.speed = type === 1 ? MathUtils.rand(80, 120) : MathUtils.rand(160, 220);
                this.hp = type === 1 ? 20 * difficultyMultiplier : 10 * difficultyMultiplier;
                this.damage = type === 1 ? 10 : 5;
                if(type === 2) this.r = 6; // Pink ones are small and fast
            }
            update(dt) {
                let angle = MathUtils.angle(this.x, this.y, player.x, player.y);
                this.vx = Math.cos(angle) * this.speed;
                this.vy = Math.sin(angle) * this.speed;
                super.update(dt);
            }
            takeDamage(amt) {
                this.hp -= amt;
                spawnParticles(this.x, this.y, 2, this.color, 100);
                entities.texts.push(new FloatingText(this.x, this.y, amt, '#fff'));
                if(this.hp <= 0) {
                    this.markedForDeletion = true;
                    score += 10; updateHUD();
                    WebAudioSynth.playExp();
                    spawnParticles(this.x, this.y, 8, this.color, 150);
                    entities.gems.push(new Gem(this.x, this.y, this.type === 1 ? 20 : 10));
                }
            }
        }

        class Bullet extends GameObject {
            constructor(x, y, angle, speed, dmg, pierce) {
                super(x, y, 4, '#0ff');
                this.vx = Math.cos(angle) * speed; this.vy = Math.sin(angle) * speed;
                this.damage = dmg; this.pierce = pierce; this.hitList =[];
                this.life = 2;
            }
            update(dt) {
                super.update(dt);
                this.life -= dt; if(this.life <= 0) this.markedForDeletion = true;
            }
        }

        class Particle extends GameObject {
            constructor(x, y, color, speed, dir=null, spread=Math.PI*2) {
                super(x, y, MathUtils.rand(1, 3), color);
                let angle = dir !== null ? dir + MathUtils.rand(-spread/2, spread/2) : MathUtils.rand(0, Math.PI*2);
                let s = MathUtils.rand(speed*0.5, speed);
                this.vx = Math.cos(angle) * s; this.vy = Math.sin(angle) * s;
                this.life = MathUtils.rand(0.2, 0.6);
            }
            update(dt) {
                super.update(dt); this.vx *= 0.9; this.vy *= 0.9; this.life -= dt;
                if(this.life <= 0) this.markedForDeletion = true;
            }
            draw(ctx) {
                ctx.globalAlpha = Math.max(0, this.life * 2);
                super.draw(ctx); ctx.globalAlpha = 1;
            }
        }

        class Gem extends GameObject {
            constructor(x, y, val) { super(x, y, 4, '#0f0'); this.val = val; }
            update(dt) {
                let dist = MathUtils.dist(this.x, this.y, player.x, player.y);
                if(dist < player.magnetRadius) {
                    let angle = MathUtils.angle(this.x, this.y, player.x, player.y);
                    this.vx = Math.cos(angle) * 400; this.vy = Math.sin(angle) * 400;
                    super.update(dt);
                    if(dist < player.r + this.r) {
                        this.markedForDeletion = true; player.addXP(this.val);
                    }
                }
            }
            draw(ctx) {
                ctx.fillStyle = this.color; ctx.shadowBlur = 10; ctx.shadowColor = this.color;
                ctx.fillRect(this.x-this.r, this.y-this.r, this.r*2, this.r*2); ctx.shadowBlur = 0;
            }
        }

        class FloatingText {
            constructor(x, y, text, color) {
                this.x = x + MathUtils.rand(-10, 10); this.y = y;
                this.text = text; this.color = color;
                this.life = 0.5; this.vy = -50;
            }
            update(dt) { this.y += this.vy * dt; this.life -= dt; if(this.life <= 0) this.markedForDeletion = true; }
            draw(ctx) {
                ctx.fillStyle = this.color; ctx.globalAlpha = Math.max(0, this.life * 2);
                ctx.font = 'bold 12px Orbitron'; ctx.fillText(this.text, this.x, this.y);
                ctx.globalAlpha = 1;
            }
        }

        /* =====================================================================
           UPGRADE DECK SYSTEM
           ===================================================================== */
        const UPGRADES =[
            { id: 1, name: "Heavy Caliber", desc: "+25% Damage", apply: () => player.damage *= 1.25 },
            { id: 2, name: "Overclock", desc: "+20% Fire Rate", apply: () => player.fireRate *= 0.8 },
            { id: 3, name: "Split Shot", desc: "Fires an additional projectile", apply: () => player.multiShot += 1 },
            { id: 4, name: "Railgun Tech", desc: "Bullets pierce 1 extra enemy", apply: () => player.pierce += 1 },
            { id: 5, name: "Thrusters", desc: "+15% Movement Speed", apply: () => player.speed *= 1.15 },
            { id: 6, name: "Magnetic Field", desc: "+50% XP Pickup Range", apply: () => player.magnetRadius *= 1.5 },
            { id: 7, name: "Nanobots", desc: "Heal to full & +20 Max HP", apply: () => { player.maxHp += 20; player.hp = player.maxHp; updateHUD(); } }
        ];

        function triggerLevelUp() {
            currentState = STATE.UPGRADE; document.body.classList.remove('playing');
            WebAudioSynth.playLevelUp();
            keys.w = keys.a = keys.s = keys.d = false; mouse.down = false; 
            document.getElementById('upgradeScreen').classList.remove('hidden');
            
            let deck = [...UPGRADES].sort(() => 0.5 - Math.random()).slice(0, 3);
            let container = document.getElementById('upgradeCards');
            container.innerHTML = '';
            
            deck.forEach(u => {
                let card = document.createElement('div'); card.className = 'card';
                card.innerHTML = `<h3>${u.name}</h3><p>${u.desc}</p>`;
                card.onclick = () => { u.apply(); resumeGame(); };
                container.appendChild(card);
            });
        }

        function resumeGame() {
            document.getElementById('upgradeScreen').classList.add('hidden');
            currentState = STATE.PLAYING; document.body.classList.add('playing');
            lastTime = performance.now(); // Prevents delta-time spike
            requestAnimationFrame(gameLoop);
        }

        /* =====================================================================
           CORE ENGINE
           ===================================================================== */
        function resize() { cw = canvas.width = window.innerWidth; ch = canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        // Inputs
        window.addEventListener('keydown', e => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', e => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false; });
        window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
        window.addEventListener('mousedown', e => {
            if(e.target.closest('.joystick-zone') || e.target.closest('.interactive')) return;
            mouse.down = true; 
        });
        window.addEventListener('mouseup', () => mouse.down = false);

        // UI Listeners
        document.getElementById('startBtn').addEventListener('click', initGame);
        document.getElementById('restartBtn').addEventListener('click', initGame);
        
        document.getElementById('fullscreenToggle').addEventListener('click', () => {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(e => console.log(e));
            else if (document.exitFullscreen) document.exitFullscreen();
        });

        document.getElementById('pauseBtn').addEventListener('click', () => {
            currentState = STATE.PAUSED; document.body.classList.remove('playing');
            document.getElementById('pauseScreen').classList.remove('hidden');
        });
        window.resumeFromPause = () => {
            currentState = STATE.PLAYING; document.body.classList.add('playing');
            document.getElementById('pauseScreen').classList.add('hidden');
            lastTime = performance.now();
            requestAnimationFrame(gameLoop);
        };

        function spawnParticles(x, y, count, color, speed, dir=null, spread=Math.PI*2) {
            for(let i=0; i<count; i++) entities.particles.push(new Particle(x, y, color, speed, dir, spread));
        }

        function spawnEnemy() {
            let angle = Math.random() * Math.PI * 2;
            let dist = Math.max(cw, ch) / 2 + 100;
            entities.enemies.push(new Enemy(player.x + Math.cos(angle)*dist, player.y + Math.sin(angle)*dist, Math.random() > 0.8 ? 2 : 1));
        }

        function initGame() {
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            document.getElementById('hud').classList.remove('hidden');
            document.getElementById('controls-bar').classList.remove('hidden');
            
            player = new Player(0, 0);
            entities = { enemies: [], bullets: [], particles: [], gems: [], texts:[] };
            score = 0; gameTime = 0; difficultyMultiplier = 1;
            updateHUD();
            
            currentState = STATE.PLAYING; 
            document.body.classList.add('playing');
            if(touchMode) initTouchControls();
            
            lastTime = performance.now();
            requestAnimationFrame(gameLoop);
        }

        function updateHUD() {
            document.getElementById('hpBar').style.width = `${(Math.max(0, player.hp)/player.maxHp)*100}%`;
            document.getElementById('xpBar').style.width = `${(player.xp/player.xpToNext)*100}%`;
            document.getElementById('levelText').innerText = `LEVEL ${player.level}`;
            document.getElementById('scoreText').innerText = `SCORE: ${score}`;
        }

        function gameOver() {
            currentState = STATE.GAMEOVER; document.body.classList.remove('playing');
            document.getElementById('hud').classList.add('hidden');
            document.getElementById('controls-bar').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.remove('hidden');
            let m = Math.floor(gameTime/60).toString().padStart(2, '0');
            let s = Math.floor(gameTime%60).toString().padStart(2, '0');
            document.getElementById('finalStats').innerText = `Survived for ${m}:${s} with ${score} points.\nReached Level ${player.level}.`;
        }

        function update(dt) {
            gameTime += dt;
            document.getElementById('timeText').innerText = `${Math.floor(gameTime/60).toString().padStart(2,'0')}:${Math.floor(gameTime%60).toString().padStart(2,'0')}`;
            difficultyMultiplier = 1 + (gameTime / 60);
            
            if(Math.random() < (dt / Math.max(0.2, 1.5 - (gameTime * 0.005)))) spawnEnemy();

            player.update(dt);
            
            camera.x += ((player.x - cw/2) - camera.x) * 5 * dt;
            camera.y += ((player.y - ch/2) - camera.y) * 5 * dt;['bullets', 'enemies', 'particles', 'gems', 'texts'].forEach(group => entities[group].forEach(e => e.update(dt)));

            for(let b of entities.bullets) {
                if(b.markedForDeletion) continue;
                for(let e of entities.enemies) {
                    if(e.markedForDeletion || b.hitList.includes(e)) continue;
                    if(MathUtils.dist(b.x, b.y, e.x, e.y) < b.r + e.r) {
                        e.takeDamage(b.damage); b.hitList.push(e);
                        if(b.hitList.length >= b.pierce) b.markedForDeletion = true;
                        break;
                    }
                }
            }

            for(let e of entities.enemies) {
                if(e.markedForDeletion) continue;
                if(MathUtils.dist(e.x, e.y, player.x, player.y) < e.r + player.r) {
                    player.takeDamage(e.damage); e.markedForDeletion = true;
                }
            }['bullets', 'enemies', 'particles', 'gems', 'texts'].forEach(group => {
                entities[group] = entities[group].filter(e => !e.markedForDeletion);
            });
        }

        function render() {
            ctx.fillStyle = 'rgba(5, 5, 8, 0.4)'; ctx.fillRect(0, 0, cw, ch);
            ctx.save();
            
            // Screen Shake Math built cleanly into the camera transform
            let sx = 0, sy = 0;
            if(screenShake > 0) {
                sx = MathUtils.rand(-screenShake, screenShake); sy = MathUtils.rand(-screenShake, screenShake);
                screenShake *= 0.9; if(screenShake < 0.5) screenShake = 0;
            }
            
            ctx.translate(-camera.x + sx, -camera.y + sy);
            
            // Draw Grid
            ctx.strokeStyle = 'rgba(0, 255, 255, 0.05)'; ctx.lineWidth = 2; ctx.beginPath();
            let gs = 100, sX = Math.floor(camera.x/gs)*gs, sY = Math.floor(camera.y/gs)*gs;
            for(let x=sX; x<sX+cw+gs; x+=gs) { ctx.moveTo(x, camera.y); ctx.lineTo(x, camera.y+ch); }
            for(let y=sY; y<sY+ch+gs; y+=gs) { ctx.moveTo(camera.x, y); ctx.lineTo(camera.x+cw, y); }
            ctx.stroke();
            
            entities.gems.forEach(g => g.draw(ctx));
            entities.enemies.forEach(e => e.draw(ctx));
            entities.bullets.forEach(b => b.draw(ctx));
            entities.particles.forEach(p => p.draw(ctx));
            player.draw(ctx);
            entities.texts.forEach(t => t.draw(ctx));
            
            ctx.restore();
        }

        function gameLoop(time) {
            if(currentState !== STATE.PLAYING) return;
            dt = Math.min((time - lastTime) / 1000, 0.1); 
            lastTime = time;
            update(dt);
            render();
            requestAnimationFrame(gameLoop);
        }

        ctx.fillStyle = '#050508'; ctx.fillRect(0,0,9999,9999);
    </script>
</body>
</html>
